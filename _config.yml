        caption: 2015 - 2019
        description: |
          - **Suporte Avançado e Conectividade:** Execução de suporte técnico N1 e N2 em hardware, sistemas e infraestrutura de rede, garantindo a rápida resolução de chamados.
          - **Operação e Continuidade de Negócio:** Atuação direta em manutenções preventivas e corretivas e controle de inventário de ativos, minimizando impactos de paradas técnicas no ambiente operacional.

