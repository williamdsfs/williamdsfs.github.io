# About Section
about_title: Resumo Profissional
about_content: |
  Atuo há 11 anos na área de TI, com sólida experiência em infraestrutura, administração de ambientes Windows/Linux e suporte a sistemas de missão crítica. Atualmente, foco meu trabalho na automação de processos e melhoria da eficiência operacional utilizando Python, Ruby, Ansible e integração com IA. 
  
  Possuo MBA em Análise e Ciência de Dados e busco constantemente o aprimoramento técnico, com estudos avançados em arquitetura AWS e soluções de dados Snowflake. Meu objetivo é garantir ambientes estáveis, seguros e automatizados, alinhando a infraestrutura às necessidades de evolução tecnológica da empresa.

content:
  - title: Experiência Profissional
    layout: list
    content:
      - layout: right
        title: Chatuba Materiais de Construção
        sub_title: Analista de Infraestrutura de TI
        caption: 2019 - Presente
        description: |
          - **Gestão de Infraestrutura e Redes:** Administração de ambientes Windows, Linux e Microsoft 365, garantindo a alta disponibilidade, performance e sustentação dos serviços críticos.
          - **Automação e IaC (Infraestrutura como Código):** Desenvolvimento de scripts e playbooks utilizando Python, Ansible, Ruby e PowerShell, incluindo a integração de IA para otimização de rotinas operacionais e deploys.
          - **Observabilidade e Segurança:** Implantação e manutenção de ecossistema de monitoramento distribuído e soluções de SIEM corporativo focadas na antecipação de falhas, análise de métricas e resposta a incidentes.
          - **Administração de Banco de Dados:** Gestão de instâncias SQL Server, assegurando a integridade, rotinas de backup e o acesso seguro aos dados corporativos.
          - **Governança e Projetos de TI:** Atuação técnica em projetos de transformação digital e governança de ativos através de ferramentas centrais de ITSM, gerenciamento de dispositivos móveis (MDM) e Endpoint Management.

      - layout: right
